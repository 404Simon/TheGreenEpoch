    <meta name="description" content="Simulate CO₂-aware LLM training. Pause training when carbon intensity is high, resume when it's low — reduce emissions without changing hardware." />

    <title>TheGreenEpoch - CO₂-aware LLM training simulator</title>
    <script>
      (function() {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.pathname + location.search + location.hash) {
          history.replaceState(null, '', redirect);
        }
      })();
    </script>
