image: texlive/texlive:latest
stages:
  - build

variables:
  GIT_SUBMODULE_STRATEGY: recursive

render-thesis:
  stage: build
  needs: []
  script:
    - make all || true
    - head -n 0 thesis.pdf
  artifacts:
    expose_as: "Rendered PDF"
    paths: [thesis.pdf]
    expire_in: 4 days
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

release-thesis:
  stage: build
  needs: []
  script:
    - make all || true
    - head -n 0 thesis.pdf
  artifacts:
    expose_as: "Rendered PDF"
    paths: [thesis.pdf]
    expire_in: 2 years
  rules:
    - if: $CI_COMMIT_TAG
      when: always
